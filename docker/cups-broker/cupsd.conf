# CUPS — broker Claudine pour l'imprimante virtuelle de l'Amicale.
# Une seule queue (claudine), basic auth, pas d'admin web, pas de découverte.

LogLevel warn
MaxLogSize 10m

# Listen sur toutes les interfaces (le container écoute sur le host VPS via
# network_mode: host ; UFW ne laisse passer que via Caddy sur 443).
Listen 0.0.0.0:631
Listen /var/run/cups/cups.sock

# ServerAlias * = accepter n'importe quel header Host. Nécessaire derrière
# Caddy qui forwarde avec Host: print.amicalewifi.ch — sans ce wildcard,
# CUPS retourne 400 Bad Request en validation stricte. La protection
# contre le DNS rebinding est de toute façon assurée par Caddy en amont.
ServerAlias *

# Pas de Bonjour / mDNS — les members ajoutent l'imprimante manuellement via
# l'URL public. Évite tout broadcast inutile sur le réseau du host.
Browsing No
BrowseLocalProtocols none

DefaultAuthType Basic
# TLS terminé par Caddy en amont — la connexion Caddy → CUPS est en HTTP
# loopback, sans chiffrement. Sans ce "Never", CUPS retourne 426 Upgrade
# Required en exigeant TLS avant la basic-auth.
DefaultEncryption Never
WebInterface No

# Garder un peu d'historique mais pas illimité.
MaxJobs 50
PreserveJobHistory Yes
PreserveJobFiles No

<Location />
    Order allow,deny
    Allow all
</Location>

<Location /admin>
    Order allow,deny
    Deny all
</Location>

<Location /admin/conf>
    AuthType Default
    Require user @SYSTEM
    Order allow,deny
    Deny all
</Location>

# Queue claudine — exige un username + password à chaque job. Notre backend
# Python (amicale-broker) lit le password via $AUTH_INFO_PASSWORD, l'envoie au
# coworker-app pour validation, et procède au print s'il est accepté.
<Location /printers/claudine>
    AuthType Basic
    Require valid-user
    Order allow,deny
    Allow all
</Location>

<Policy default>
    JobPrivateAccess     default
    JobPrivateValues     default
    SubscriptionPrivateAccess default
    SubscriptionPrivateValues default

    <Limit Send-Document Send-URI Cancel-Job Hold-Job Release-Job Restart-Job Purge-Jobs CUPS-Authenticate-Job>
        Require user @OWNER @SYSTEM
        Order deny,allow
    </Limit>

    <Limit All>
        Order deny,allow
    </Limit>
</Policy>
