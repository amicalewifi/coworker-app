# CUPS — broker Claudine pour l'imprimante virtuelle de l'Amicale.
# Une seule queue (claudine), basic auth sur les opérations d'impression
# uniquement (pour laisser passer la discovery IPP), pas d'admin web, pas de
# découverte mDNS.

LogLevel warn
MaxLogSize 10m

# Passe explicitement nos vars d'env du container vers les backends. Sans ça,
# cupsd sanitise l'env avant de spawn les backends et amicale-broker ne voit
# que les vars CUPS standard (DEVICE_URI, AUTH_INFO_*, etc.) — pas nos
# AMICALE_*. Symptôme sans ce PassEnv : "AMICALE_PRINT_BROKER_KEY non
# configuré dans l'env du container" alors qu'il est bien set au niveau du
# container Docker.
PassEnv AMICALE_PRINT_BROKER_KEY
PassEnv AMICALE_APP_URL
PassEnv AMICALE_PRINTER_HOST
PassEnv AMICALE_PRINTER_PORT
PassEnv AMICALE_QUEUE_NAME

# Listen sur le port interne 6310 (le container est en network_mode: host,
# donc occupe directement le host). On NE peut PAS prendre 631 ici parce que
# Caddy a besoin du 631 public pour servir IPPS standard avec TLS — sinon
# conflit de bind. Les clients OS ne touchent jamais ce port directement,
# c'est uniquement Caddy qui reverse-proxy vers 172.18.0.1:6310.
Listen 0.0.0.0:6310
Listen /var/run/cups/cups.sock

# ServerAlias * = accepter n'importe quel header Host. Nécessaire derrière
# Caddy qui forwarde avec Host: print.amicalewifi.ch — sans ce wildcard,
# CUPS retourne 400 Bad Request en validation stricte. La protection
# contre le DNS rebinding est de toute façon assurée par Caddy en amont.
ServerAlias *

# Pas de Bonjour / mDNS — les members ajoutent l'imprimante manuellement via
# l'URL public. Évite tout broadcast inutile sur le réseau du host.
Browsing No
BrowseLocalProtocols none

DefaultAuthType Basic
# TLS terminé par Caddy en amont — la connexion Caddy → CUPS est en HTTP
# loopback, sans chiffrement. Sans ce "Never", CUPS retourne 426 Upgrade
# Required en exigeant TLS avant la basic-auth.
DefaultEncryption Never
WebInterface No

# Garder un peu d'historique mais pas illimité.
MaxJobs 50
PreserveJobHistory Yes
PreserveJobFiles No

<Location />
    Order allow,deny
    Allow all
</Location>

<Location /admin>
    Order allow,deny
    Deny all
</Location>

<Location /admin/conf>
    AuthType Default
    Require user @SYSTEM
    Order allow,deny
    Deny all
</Location>

# Queue claudine — pas d'auth au niveau Location, pour que les opérations IPP
# de discovery (Get-Printer-Attributes, Validate-Job, etc.) passent sans creds.
# L'auth est imposée plus bas, au niveau Policy, uniquement sur les opérations
# qui soumettent ou manipulent un job.
#
# Pourquoi : Windows 11 ne propose pas de prompt de creds pendant la phase
# « Connexion à l'imprimante » de l'install. Avec un gate Location-level,
# CUPS répondait 401 au probe IPP initial → install échoue avec
# 0x000003fa (ERROR_INVALID_PRINTER_STATE). macOS lui retry avec auth, donc
# masquait le problème. Ce changement laisse le probe passer ; les creds sont
# demandées (ou récupérées de l'URI-embed `ipps://USER:PWD@…`) au moment où
# le client tente Print-Job/Create-Job/Send-Document — où CUPS valide la
# basic-auth via PAM permissif (cf. /etc/pam.d/cups dans l'image) et expose
# $AUTH_USERNAME / $AUTH_PASSWORD au backend amicale-broker. La VRAIE
# vérification (matching du print_token contre le Member coworker-app) reste
# faite dans le backend.
<Location /printers/claudine>
    Order allow,deny
    Allow all
</Location>

<Policy default>
    JobPrivateAccess     default
    JobPrivateValues     default
    SubscriptionPrivateAccess default
    SubscriptionPrivateValues default

    # Soumission de job — auth requise. CUPS challenge en basic-auth, valide
    # via PAM permissif (toujours OK), puis propage les creds au backend dans
    # $AUTH_USERNAME / $AUTH_PASSWORD pour que amicale-broker matche le
    # print_token. Couvre les deux variantes IPP : Print-Job (mono-document)
    # et Create-Job + Send-Document (multi-doc, utilisé par certains drivers
    # Windows).
    <Limit Print-Job Create-Job>
        AuthType Basic
        Require valid-user
        Order deny,allow
    </Limit>

    # Manipulation de jobs existants — réservé au propriétaire (set au moment
    # du Create-Job par CUPS) ou à root.
    <Limit Send-Document Send-URI Cancel-Job Hold-Job Release-Job Restart-Job Purge-Jobs CUPS-Authenticate-Job>
        Require user @OWNER @SYSTEM
        Order deny,allow
    </Limit>

    # Tout le reste (Get-Printer-Attributes, Get-Jobs, Validate-Job, etc.) —
    # passe sans auth, pour que les probes IPP des OS clients fonctionnent.
    <Limit All>
        Order deny,allow
    </Limit>
</Policy>
