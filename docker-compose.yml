services:

  app:
    # In production the VPS pulls from GHCR (image built and pushed by GitHub
    # Actions on every merge to main — see .github/workflows/deploy.yml).
    # `build:` is kept so local dev (`docker compose build app`) still works;
    # the build will be tagged with the same image name.
    image: ghcr.io/amicalewifi/coworker-app:latest
    build:
      context: .
    container_name: amicale_app
    restart: unless-stopped
    # Give Spring Boot's graceful shutdown enough time to finish in-flight
    # requests on SIGTERM (server.shutdown=graceful + 20s in application.yml).
    # Default Docker SIGTERM-to-SIGKILL gap is 10s, which would cut it short.
    stop_grace_period: 30s
    env_file: .env
    environment:
      SPRING_DATASOURCE_URL:                       jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME:                  ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD:                  ${POSTGRES_PASSWORD}
    # Publié sur la loopback du host pour que le container `cups`
    # (en network_mode: host pour atteindre wg0) puisse joindre l'app via
    # 127.0.0.1:8081. Pas exposé publiquement — Caddy reste le seul ingress.
    ports:
      - "127.0.0.1:8081:8081"
    expose:
      - "8081"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: amicale_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB}
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout:  5s
      retries:  5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: amicale_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL:    ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
      PGADMIN_LISTEN_PORT:      5050
    ports:
      - "127.0.0.1:5050:5050"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy

  caddy:
    image: caddy:2-alpine
    container_name: amicale_caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    # Le container `cups` tourne en network_mode: host. Caddy l'atteint via
    # le gateway Docker — host.docker.internal résolu vers host-gateway.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./ops/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

  # CUPS broker pour Claudine (imprimante virtuelle IPP).
  # network_mode: host est requis pour atteindre 192.168.1.10 via wg0
  # (l'interface WireGuard vit dans le namespace réseau du host).
  # Pas d'`image:` — l'image n'est pas publiée sur GHCR (build-only local).
  # Compose génère un tag automatique du type repo-cups au build, et skippe
  # le service à `docker compose pull` car il n'y a que `build:`.
  cups:
    build:
      context: ./docker/cups-broker
    container_name: amicale_cups
    restart: unless-stopped
    network_mode: host
    environment:
      AMICALE_APP_URL:           http://127.0.0.1:8081
      AMICALE_PRINT_BROKER_KEY:  ${AMICALE_PRINT_BROKER_KEY}
      AMICALE_PRINTER_HOST:      192.168.1.10
      AMICALE_PRINTER_PORT:      9100
      AMICALE_QUEUE_NAME:        claudine
    volumes:
      - cups_spool:/var/spool/cups
    depends_on:
      - app

volumes:
  postgres_data:
  pgadmin_data:
  caddy_data:
  caddy_config:
  cups_spool:

# Public:    https://coworker.amicalewifi.ch                   → Caddy → app:8081
#            https://print.amicalewifi.ch/printers/claudine    → Caddy → CUPS:631 (IPPS)
# pgAdmin:   http://127.0.0.1:5050           (SSH-tunnel from your laptop)
# Postgres:  127.0.0.1:5432                  (SSH-tunnel from your laptop)
# App:       127.0.0.1:8081                  (loopback only, used by CUPS broker)
