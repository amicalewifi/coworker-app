version: '3.9'
services:

  app:
    build:
      context: .
    image: amicale-wifi:latest
    container_name: amicale_app
    restart: unless-stopped
    env_file: .env
    environment:
      SPRING_DATASOURCE_URL:      jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
    expose:
      - "8081"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: amicale_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB}
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout:  5s
      retries:  5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: amicale_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL:    ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
      PGADMIN_LISTEN_PORT:      5050
    ports:
      - "127.0.0.1:5050:5050"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy

  caddy:
    image: caddy:2-alpine
    container_name: amicale_caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./ops/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

  databasus:
    image: databasus/databasus:latest
    container_name: amicale_databasus
    restart: unless-stopped
    ports:
      - "127.0.0.1:4005:4005"
    volumes:
      - databasus_data:/databasus-data
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  pgadmin_data:
  caddy_data:
  caddy_config:
  databasus_data:

# Public:    https://coworker.amicalewifi.ch  → Caddy → app:8081
# pgAdmin:   http://127.0.0.1:5050           (SSH-tunnel from your laptop)
# Databasus: http://127.0.0.1:4005           (SSH-tunnel from your laptop)
# Postgres:  127.0.0.1:5432                  (SSH-tunnel from your laptop)
