version: '3.9'
services:

  postgres:
    image: postgres:16-alpine
    container_name: amicale_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       amicale_wifi
      POSTGRES_USER:     amicale
      POSTGRES_PASSWORD: amicale2024
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U amicale -d amicale_wifi"]
      interval: 10s
      timeout:  5s
      retries:  5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: amicale_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL:    admin@amicalewifi.ch
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_LISTEN_PORT:      5050
    ports:
      - "5050:5050"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  pgadmin_data:

# pgAdmin → http://localhost:5050
# Email: admin@amicalewifi.ch  /  Password: admin
# Serveur: host=postgres  port=5432  db=amicale_wifi  user=amicale  pass=amicale2024
