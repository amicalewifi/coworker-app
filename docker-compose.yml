services:

  app:
    # In production the VPS pulls from GHCR (image built and pushed by GitHub
    # Actions on every merge to main — see .github/workflows/deploy.yml).
    # `build:` is kept so local dev (`docker compose build app`) still works;
    # the build will be tagged with the same image name.
    image: ghcr.io/amicalewifi/coworker-app:latest
    build:
      context: .
    container_name: amicale_app
    restart: unless-stopped
    # Give Spring Boot's graceful shutdown enough time to finish in-flight
    # requests on SIGTERM (server.shutdown=graceful + 20s in application.yml).
    # Default Docker SIGTERM-to-SIGKILL gap is 10s, which would cut it short.
    stop_grace_period: 30s
    env_file: .env
    environment:
      SPRING_DATASOURCE_URL:                       jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME:                  ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD:                  ${POSTGRES_PASSWORD}
    # Publié sur la loopback du host pour que le container `claudine`
    # (en network_mode: host pour atteindre wg0) puisse joindre l'app via
    # 127.0.0.1:8081. Pas exposé publiquement — Caddy reste le seul ingress.
    ports:
      - "127.0.0.1:8081:8081"
    expose:
      - "8081"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: amicale_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB}
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout:  5s
      retries:  5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: amicale_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL:    ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
      PGADMIN_LISTEN_PORT:      5050
    ports:
      - "127.0.0.1:5050:5050"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy

  caddy:
    image: caddy:2-alpine
    container_name: amicale_caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      # Port standard IPPS (RFC 8011) — clients OS tapent
      # `ipps://print.amicalewifi.ch/printers/claudine` sans port explicite.
      # UFW ouvre 631/tcp public via bootstrap.sh étape 4.
      - "631:631"
    volumes:
      - ./ops/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

  # Claudine — mini reverse-proxy IPPS Go entre Caddy et la Kyocera native.
  # Remplace l'ancienne stack PAPPL (et avant, CUPS) qui essayait de
  # réimplémenter IPP Everywhere côté serveur. La Kyocera TASKalfa 352ci
  # est elle-même IPP Everywhere conformante (testée AirPrint+Mopria) et
  # parle nativement au Microsoft IPP Class Driver. claudine-proxy ne fait
  # plus que (1) authentifier le client via Basic auth contre coworker-app,
  # (2) forward le job IPP brut en streaming à 192.168.1.10:443, (3) poller
  # la Kyocera après le job pour récupérer le page count et débiter les
  # crédits via /api/v1/print/{jobId}/complete.
  #
  # network_mode: host est requis pour atteindre 192.168.1.10 via wg0
  # (l'interface WireGuard vit dans le namespace réseau du host).
  # Pas d'`image:` — l'image n'est pas publiée sur GHCR (build-only local).
  claudine:
    build:
      context: ./docker/claudine-proxy
    container_name: amicale_claudine
    restart: unless-stopped
    network_mode: host
    environment:
      AMICALE_APP_URL:           http://127.0.0.1:8081
      AMICALE_PRINT_BROKER_KEY:  ${AMICALE_PRINT_BROKER_KEY}
      AMICALE_PRINTER_HOST:      192.168.1.10
      AMICALE_PRINTER_PORT:      443
      AMICALE_QUEUE_NAME:        claudine
    depends_on:
      - app

volumes:
  postgres_data:
  pgadmin_data:
  caddy_data:
  caddy_config:

# Pin du subnet du bridge `default` pour que l'IP du gateway (172.18.0.1)
# soit stable. Caddy reverse-proxy vers cette IP pour atteindre claudine-proxy
# en network_mode: host (le gateway du bridge depuis l'intérieur du bridge =
# le host lui-même). Une règle UFW dans bootstrap.sh autorise ce subnet →
# host:8000 (port d'écoute claudine-proxy).
networks:
  default:
    ipam:
      config:
        - subnet: 172.18.0.0/16

# Public:    https://coworker.amicalewifi.ch                   → Caddy → app:8081
#            https://print.amicalewifi.ch/printers/claudine    → Caddy → claudine-proxy (network_mode:host, IPPS)
# pgAdmin:   http://127.0.0.1:5050           (SSH-tunnel from your laptop)
# Postgres:  127.0.0.1:5432                  (SSH-tunnel from your laptop)
# App:       127.0.0.1:8081                  (loopback only, used by claudine-proxy)
