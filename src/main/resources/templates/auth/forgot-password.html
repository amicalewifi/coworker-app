<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mot de passe oublié — l'Amicale du WiFi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&family=Open+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/amicale.css}">
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; padding:24px;
           background: radial-gradient(ellipse at 60% 0%, rgba(0,122,245,.07) 0%, transparent 60%), var(--bg); }
    .box { background:var(--surf); border:1px solid var(--bdr); border-radius:var(--r-xl);
           padding:38px 42px; width:100%; max-width:420px; box-shadow:var(--shadow-lg); }
  </style>
</head>
<body>
<div class="box">
  <div style="text-align:center;margin-bottom:24px;">
    <img th:src="@{/images/logo.svg}" alt="l'Amicale du WiFi" style="height:48px;width:auto;">
  </div>
  <div style="font-size:22px;font-weight:900;letter-spacing:-.5px;margin-bottom:6px;">Mot de passe oublié</div>
  <div style="font-size:14px;color:var(--t2);margin-bottom:24px;">
    Entrez votre email — nous vous enverrons un lien de réinitialisation.
  </div>

  <form th:action="@{/forgot-password}" method="post">
    <div class="form-row">
      <label class="form-lbl">Adresse email</label>
      <input type="email" name="email" class="form-in" placeholder="votre@email.ch" required autofocus>
    </div>
    <button type="submit" class="btn btn-g btn-full" style="margin-top:8px;">Envoyer le lien</button>
  </form>

  <div style="text-align:center;margin-top:16px;font-size:13px;color:var(--t2);">
    <a th:href="@{/login}" style="color:var(--t3);">← Retour à la connexion</a>
  </div>
</div>
</body>
</html>
