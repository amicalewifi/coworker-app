<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion — l'Amicale du WiFi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&family=Open+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/amicale.css}">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: radial-gradient(ellipse 80% 60% at 70% -10%, rgba(0,122,245,.07) 0%, transparent 60%),
                  radial-gradient(ellipse 60% 40% at -10% 110%, rgba(0,98,200,.05) 0%, transparent 50%),
                  var(--bg);
      animation: bg-shift 14s ease-in-out infinite alternate;
    }
    @keyframes bg-shift {
      from { background-position: 70% -10%, -10% 110%; }
      to   { background-position: 75% -5%, -5% 105%; }
    }
    .login-wrap { width: 100%; max-width: 440px; padding: 24px; }
    .logo-bar { display: flex; align-items: center; gap: 16px; margin-bottom: 36px; }
    .box {
      background: var(--surf);
      border: 1px solid var(--bdr);
      border-radius: var(--r-xl);
      padding: 36px 40px;
      box-shadow: var(--shadow-lg);
    }
    .divider { border: none; border-top: 1px solid var(--bdr); margin: 22px 0; }
  </style>
</head>
<body>
<div class="login-wrap">

  <div class="logo-bar" style="margin-bottom:32px; justify-content:center;">
    <img th:src="@{/images/logo.svg}" alt="l'Amicale du WiFi" style="height:88px; width:auto;">
  </div>

  <div class="box">
    <div style="font-size:26px;font-weight:900;letter-spacing:-.7px;margin-bottom:6px;">Connexion</div>
    <div style="font-size:14px;color:var(--t2);margin-bottom:26px;">Accédez à votre espace membre.</div>

    <div th:if="${param.error}" class="flash flash-err" style="margin-bottom:16px;">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" style="flex-shrink:0"><circle cx="8" cy="8" r="6"/><path d="M8 5v3M8 11h.01"/></svg>
      <span>Email ou mot de passe incorrect.</span>
    </div>
    <div th:if="${param.logout}" class="flash flash-ok" style="margin-bottom:16px;">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" style="flex-shrink:0"><path d="M3 8l4 4 6-6"/></svg>
      <span>Vous avez été déconnecté.</span>
    </div>
    <div th:if="${param.registered}" class="flash flash-ok" style="margin-bottom:16px;">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" style="flex-shrink:0"><path d="M3 8l4 4 6-6"/></svg>
      <span>Compte créé avec succès — connectez-vous.</span>
    </div>
    <div th:if="${success}" class="flash flash-ok" style="margin-bottom:16px;">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" style="flex-shrink:0"><path d="M3 8l4 4 6-6"/></svg>
      <span th:text="${success}"></span>
    </div>

    <form th:action="@{/login}" method="post">
      <div class="form-row">
        <label class="form-lbl">Adresse email</label>
        <input type="email" name="username" class="form-in"
               placeholder="votre@email.ch" autocomplete="email" required autofocus>
      </div>
      <div class="form-row" style="margin-bottom:22px;">
        <label class="form-lbl">Mot de passe</label>
        <input type="password" name="password" class="form-in"
               placeholder="••••••••" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn btn-g btn-full">Se connecter →</button>
    </form>

    <hr class="divider">

    <div style="text-align:center;font-size:13px;color:var(--t2);">
      Pas encore membre ?
      <a th:href="@{/register}" style="color:var(--prim);font-weight:600;">Créer un compte</a>
    </div>
  </div>
</div>
</body>
</html>
