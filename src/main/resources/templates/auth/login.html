<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion — l'Amicale du WiFi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&family=Open+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/amicale.css}">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: radial-gradient(ellipse 80% 60% at 70% -10%, rgba(39,52,139,.08) 0%, transparent 60%),
                  radial-gradient(ellipse 60% 40% at -10% 110%, rgba(39,52,139,.05) 0%, transparent 50%),
                  var(--bg);
      animation: bg-shift 14s ease-in-out infinite alternate;
    }
    @keyframes bg-shift {
      from { background-position: 70% -10%, -10% 110%; }
      to   { background-position: 75% -5%, -5% 105%; }
    }
    .login-wrap { width: 100%; max-width: 440px; padding: 24px; }
    .logo-bar { display: flex; align-items: center; gap: 16px; margin-bottom: 36px; }
    .box {
      background: var(--surf);
      border: 1px solid var(--bdr);
      border-radius: var(--r-xl);
      padding: 36px 40px;
      box-shadow: var(--shadow-lg);
    }
    .demo {
      margin-top: 20px;
      padding: 14px 16px;
      background: var(--blue-l);
      border-radius: var(--r);
      font-size: 13px;
      color: var(--blue);
      border: 1px solid #c7d9f5;
      line-height: 1.7;
    }
    .divider { border: none; border-top: 1px solid var(--bdr); margin: 22px 0; }
  </style>
</head>
<body>
<div class="login-wrap">

  <div class="logo-bar" style="margin-bottom:30px;">
    <img th:src="@{/images/logo.svg}" alt="l'Amicale du WiFi" style="height:56px; width:auto;">
  </div>

  <div class="box">
    <div style="font-size:26px;font-weight:900;letter-spacing:-.7px;margin-bottom:6px;">Connexion</div>
    <div style="font-size:14px;color:var(--t2);margin-bottom:26px;">Accédez à votre espace membre.</div>

    <div th:if="${param.error}"      class="flash flash-err" style="margin-bottom:16px;">Email ou mot de passe incorrect.</div>
    <div th:if="${param.logout}"     class="flash flash-ok"  style="margin-bottom:16px;">Vous avez été déconnecté.</div>
    <div th:if="${param.registered}" class="flash flash-ok"  style="margin-bottom:16px;">Compte créé avec succès — connectez-vous.</div>
    <div th:if="${success}"          class="flash flash-ok"  style="margin-bottom:16px;" th:text="${success}"></div>

    <form th:action="@{/login}" method="post">
      <div class="form-row">
        <label class="form-lbl">Adresse email</label>
        <input type="email" name="username" class="form-in"
               placeholder="votre@email.ch" autocomplete="email" required autofocus>
      </div>
      <div class="form-row" style="margin-bottom:22px;">
        <label class="form-lbl">Mot de passe</label>
        <input type="password" name="password" class="form-in"
               placeholder="••••••••" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn btn-g btn-full">Se connecter →</button>
    </form>

    <hr class="divider">

    <div style="text-align:center;font-size:13px;color:var(--t2);">
      Pas encore membre ?
      <a th:href="@{/register}" style="color:var(--prim);font-weight:600;">Créer un compte</a>
    </div>
  </div>

  <div class="demo" style="margin-top:16px;">
    <strong style="display:block;margin-bottom:5px;font-size:11px;text-transform:uppercase;letter-spacing:.05em;">Comptes de démo</strong>
    admin@amicalewifi.ch · <em>admin2024</em><br>
    camille@exemple.ch · <em>member2024</em>
  </div>
</div>
</body>
</html>
