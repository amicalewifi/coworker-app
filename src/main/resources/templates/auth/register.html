<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inscription — l'Amicale du Wifi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&family=Open+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/amicale.css}">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
      background: radial-gradient(ellipse at 60% 0%, rgba(0,122,245,.07) 0%, transparent 60%),
                  radial-gradient(ellipse at 0% 100%, rgba(0,98,200,.05) 0%, transparent 50%),
                  var(--bg);
    }
    .box {
      background: var(--surf);
      border: 1px solid var(--bdr);
      border-radius: var(--r-xl);
      padding: 38px 42px;
      width: 100%;
      max-width: 500px;
      box-shadow: var(--shadow-lg);
    }
    .logo { display: flex; align-items: center; justify-content: center; gap: 14px; margin-bottom: 10px; }
    .section {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .09em;
      color: var(--t3);
      margin: 22px 0 12px;
    }
  </style>
</head>
<body>
<div class="box">

  <div class="logo" style="margin-bottom:14px;">
    <img th:src="@{/images/logo.svg}" alt="l'Amicale du Wifi" style="height:52px; width:auto;">
  </div>

  <div style="font-size:26px;font-weight:900;letter-spacing:-.7px;margin-bottom:6px;">Inscription</div>
  <div style="font-size:14px;color:var(--t2);margin-bottom:24px;">
    Crée ton compte, puis achète ton pack dans ton espace membre.
  </div>

  <div th:if="${error}" class="flash flash-err" style="margin-bottom:16px;">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" style="flex-shrink:0"><circle cx="8" cy="8" r="6"/><path d="M8 5v3M8 11h.01"/></svg>
    <span th:text="${error}"></span>
  </div>

  <form th:action="@{/register}" method="post">

    <div class="section">Vos informations</div>
    <div class="form-g" style="margin-bottom:10px;">
      <div class="form-row"><label class="form-lbl">Prénom *</label>
        <input name="firstName" class="form-in" placeholder="Marie" required></div>
      <div class="form-row"><label class="form-lbl">Nom *</label>
        <input name="lastName" class="form-in" placeholder="Dupont" required></div>
    </div>
    <div class="form-row">
      <label class="form-lbl">Email *</label>
      <input name="email" type="email" class="form-in" placeholder="marie@exemple.ch" required>
    </div>
    <div class="form-row">
      <label class="form-lbl">Téléphone</label>
      <input name="phone" class="form-in" placeholder="+41 79 000 00 00">
    </div>

    <div class="section">Adresse postale</div>
    <div class="form-row">
      <label class="form-lbl">Rue et numéro *</label>
      <input name="address" class="form-in" placeholder="Rue de la Gare 12" required>
    </div>
    <div class="form-g" style="margin-bottom:10px;">
      <div class="form-row">
        <label class="form-lbl">NPA *</label>
        <input name="postalCode" class="form-in" placeholder="1926" required>
      </div>
      <div class="form-row">
        <label class="form-lbl">Localité *</label>
        <input name="city" class="form-in" placeholder="Fully" required>
      </div>
    </div>
    <div class="form-row">
      <label class="form-lbl">Pays *</label>
      <input name="country" class="form-in" placeholder="Suisse" value="Suisse" required>
    </div>

    <div class="section">Mot de passe</div>
    <div class="form-row">
      <label class="form-lbl">Mot de passe *</label>
      <input name="password" id="regPw" type="password" class="form-in" placeholder="••••••••" minlength="8" required>
    </div>

    <div class="section">Conditions Générales de Vente</div>
    <div th:replace="~{fragments/cgv :: cgv}"></div>
    <label class="form-row" style="display:flex;align-items:flex-start;gap:8px;margin-top:10px;cursor:pointer;">
      <input type="checkbox" name="acceptCgv" required style="margin-top:3px;flex-shrink:0;">
      <span class="form-lbl" style="text-transform:none;letter-spacing:normal;font-weight:500;">
        J'ai lu et j'accepte les <strong>Conditions Générales de Vente</strong> ci-dessus. *
      </span>
    </label>

    <button type="submit" class="btn btn-g btn-full" style="margin-top:8px;">Créer mon compte</button>
  </form>

  <div style="text-align:center;margin-top:16px;font-size:13px;color:var(--t2);">
    Déjà membre ?
    <a th:href="@{/login}" style="color:var(--green);font-weight:600;">Se connecter</a>
  </div>

</div>

</body>
</html>
