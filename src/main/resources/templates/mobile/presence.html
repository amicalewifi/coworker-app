<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#2e4080">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="manifest" th:href="@{/manifest.json}">
<title>Présence — l'Amicale du WiFi</title>
<link rel="stylesheet" th:href="@{/css/amicale.css}">
<style>
body{max-width:430px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;background:var(--bg);}
.app-topbar{background:var(--gd);color:#fff;padding:16px 20px;display:flex;align-items:center;gap:12px;box-shadow:0 2px 12px rgba(0,0,0,.18);}
.app-title{font-size:16px;font-weight:800;letter-spacing:-.3px;}
.app-content{flex:1;padding:20px 16px;display:flex;flex-direction:column;align-items:center;}
/* Welcome card */
.welcome-card{background:linear-gradient(135deg,#2e4080,#27348B);border-radius:20px;padding:28px 24px;text-align:center;color:#fff;width:100%;margin-bottom:20px;box-shadow:0 8px 28px rgba(26,37,102,.28);position:relative;overflow:hidden;}
.welcome-card::before{content:'';position:absolute;top:-30px;right:-30px;width:120px;height:120px;border-radius:50%;background:rgba(255,255,255,.06);}
.wc-avatar{width:60px;height:60px;border-radius:50%;background:rgba(255,255,255,.15);display:inline-flex;align-items:center;justify-content:center;font-size:22px;font-weight:800;border:2px solid rgba(255,255,255,.2);margin-bottom:12px;position:relative;z-index:1;}
.wc-greeting{font-size:14px;opacity:.7;position:relative;z-index:1;}
.wc-name{font-size:22px;font-weight:800;letter-spacing:-.5px;margin-top:2px;position:relative;z-index:1;}
.wc-membership{font-size:12px;opacity:.6;margin-top:4px;font-weight:500;position:relative;z-index:1;}
/* Pack info */
.pack-pill{display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.15);border-radius:20px;padding:8px 16px;font-size:13px;font-weight:600;color:#fff;margin-top:12px;position:relative;z-index:1;}
/* Type selection */
.type-section{width:100%;}
.type-title{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--t3);margin-bottom:12px;text-align:left;}
.type-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:16px;width:100%;}
.type-card{background:var(--surf);border:2px solid var(--bdr);border-radius:16px;padding:16px 10px;text-align:center;cursor:pointer;transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:4px;}
.type-card.sel{border-color:var(--prim);background:var(--prim-l);box-shadow:0 0 0 3px rgba(39,52,139,.12);}
.type-card input{display:none;}
.tc-icon{font-size:22px;margin-bottom:4px;}
.tc-name{font-size:13px;font-weight:700;color:var(--text);}
.tc-hours{font-size:10px;color:var(--t3);}
.tc-cost{font-size:12px;font-weight:700;margin-top:4px;}
/* Unit toggle */
.unit-toggle{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border:1.5px solid var(--bdr);border-radius:14px;cursor:pointer;margin-bottom:16px;background:var(--surf);width:100%;transition:all .15s;}
.unit-toggle.on{border-color:var(--orange);background:var(--ol);}
.toggle-chip{font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;background:var(--bg);color:var(--t3);}
.unit-toggle.on .toggle-chip{background:var(--orange);color:#fff;}
/* Confirm button */
.confirm-btn{width:100%;padding:18px;background:var(--prim);color:#fff;border-radius:16px;font-size:16px;font-weight:800;border:none;cursor:pointer;font-family:var(--font);box-shadow:0 4px 18px rgba(39,52,139,.35),inset 0 1px 0 rgba(255,255,255,.15);transition:all .2s;letter-spacing:-.2px;}
.confirm-btn:hover{background:var(--gm);transform:translateY(-2px);box-shadow:0 8px 24px rgba(39,52,139,.45);}
.back-link{margin-top:14px;font-size:13px;color:var(--t3);text-align:center;}
.back-link a{color:var(--prim);font-weight:600;}
</style>
</head>
<body>

<div class="app-topbar">
  <img th:src="@{/images/logo.svg}" alt="logo" style="height:28px;width:auto;filter:brightness(0) invert(1);">
  <div class="app-title">Déclarer ma présence</div>
</div>

<div class="app-content">

  <!-- Bienvenue -->
  <div class="welcome-card">
    <div class="wc-avatar" th:text="${member.initials}">CB</div>
    <div class="wc-greeting">Bonjour,</div>
    <div class="wc-name" th:text="${member.displayName}">Camille Berrut</div>
    <div class="wc-membership" th:text="${member.membership.label}">Pack 10 jours</div>
    <div class="pack-pill" th:if="${member.packUnitsRemaining != null}">
      <svg width="14" height="14" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h14l-1 10H4L3 6z"/><path d="M8 6V4h4v2"/></svg>
      <span th:text="${member.packUnitsRemaining}+' jours restants'"></span>
    </div>
    <div class="pack-pill" th:unless="${member.packUnitsRemaining != null}">
      <span>Abonnement illimité</span>
    </div>
  </div>

  <!-- Sélection du type -->
  <form th:action="@{/mobile/presence}" method="post" style="width:100%;">
    <input type="hidden" name="venue" th:value="${venue}">

    <div class="type-section">
      <div class="type-title">Choisissez votre type de présence</div>
      <div class="type-grid">
        <label class="type-card" onclick="selType(this)">
          <input type="radio" name="presenceType" value="HALF_AM">
          <span class="tc-icon">🌅</span>
          <span class="tc-name">½ Matin</span>
          <span class="tc-hours">07:00–12:30</span>
          <span class="tc-cost" style="color:var(--od);">−0.5j</span>
        </label>
        <label class="type-card sel" onclick="selType(this)">
          <input type="radio" name="presenceType" value="FULL_DAY" checked>
          <span class="tc-icon">☀️</span>
          <span class="tc-name">Journée</span>
          <span class="tc-hours">07:00–19:00</span>
          <span class="tc-cost" style="color:var(--gd);">−1.0j</span>
        </label>
        <label class="type-card" onclick="selType(this)">
          <input type="radio" name="presenceType" value="HALF_PM">
          <span class="tc-icon">🌇</span>
          <span class="tc-name">½ AP-M</span>
          <span class="tc-hours">12:30–19:00</span>
          <span class="tc-cost" style="color:var(--od);">−0.5j</span>
        </label>
      </div>

      <div class="unit-toggle" id="unitToggle" onclick="toggleUnit()">
        <div>
          <div style="font-size:13px;font-weight:700;">Entrée unitaire (hors pack)</div>
          <div style="font-size:11px;color:var(--t2);">Ne décompte pas vos unités</div>
        </div>
        <span class="toggle-chip" id="utChip">OFF</span>
        <input type="hidden" name="unitaire" id="unitaire" value="false">
      </div>
    </div>

    <div style="width:100%;margin-bottom:16px;">
      <label style="font-size:11px;font-weight:700;color:var(--t2);display:block;margin-bottom:6px;text-align:left;">Date de présence</label>
      <input type="date" name="date"
             th:value="${#temporals.format(#temporals.createToday(),'yyyy-MM-dd')}"
             style="width:100%;padding:12px 14px;border:1.5px solid var(--bdr);border-radius:12px;font-size:14px;font-family:var(--font);background:var(--surf-2);color:var(--text);outline:none;box-sizing:border-box;">
    </div>

    <button type="submit" class="confirm-btn">Confirmer ma présence</button>
  </form>

  <div class="back-link">
    <a th:href="@{/mobile/}">Retour au tableau de bord</a>
  </div>

</div>

<script>
function selType(el) {
  document.querySelectorAll('.type-card').forEach(o => o.classList.remove('sel'));
  el.classList.add('sel');
  el.querySelector('input[type=radio]').checked = true;
}
let isUnit = false;
function toggleUnit() {
  isUnit = !isUnit;
  document.getElementById('unitToggle').classList.toggle('on', isUnit);
  document.getElementById('utChip').textContent = isUnit ? 'ON' : 'OFF';
  document.getElementById('unitaire').value = isUnit ? 'true' : 'false';
}
</script>
</body>
</html>
