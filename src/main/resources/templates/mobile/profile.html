<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0c1222">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="manifest" th:href="@{/manifest.json}">
<title>Mon profil — l'Amicale du WiFi</title>
<link rel="stylesheet" th:href="@{/css/amicale.css}">
<style>
body{max-width:430px;margin:0 auto;min-height:100dvh;display:flex;flex-direction:column;background:var(--bg);}
.profile-header{background:linear-gradient(135deg,#0c1222 0%,#1a2a50 100%);border-radius:20px;padding:28px 20px 24px;margin-bottom:16px;text-align:center;color:#fff;box-shadow:0 6px 24px rgba(0,0,0,.25);position:relative;overflow:hidden;}
.profile-header::before{content:'';position:absolute;top:-40px;right:-40px;width:130px;height:130px;border-radius:50%;background:rgba(255,255,255,.05);}
.ph-avatar{width:68px;height:68px;border-radius:50%;background:rgba(255,255,255,.15);display:inline-flex;align-items:center;justify-content:center;font-size:24px;font-weight:800;border:2px solid rgba(255,255,255,.25);margin-bottom:12px;position:relative;z-index:1;}
.ph-name{font-size:20px;font-weight:800;letter-spacing:-.4px;position:relative;z-index:1;}
.ph-formula{font-size:12px;opacity:.65;margin-top:3px;font-weight:500;position:relative;z-index:1;}
.ph-email{font-size:12px;opacity:.5;margin-top:4px;font-weight:500;position:relative;z-index:1;}
.form-card{background:var(--surf);border:1px solid var(--bdr);border-radius:16px;padding:20px;margin-bottom:14px;box-shadow:0 1px 6px rgba(0,0,0,.04);}
.form-card-title{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--t3);margin-bottom:16px;}
.field-row{margin-bottom:14px;}
.field-row:last-child{margin-bottom:0;}
.field-lbl{font-size:11px;font-weight:700;color:var(--t2);margin-bottom:5px;display:block;}
.field-in{width:100%;padding:10px 12px;border:1.5px solid var(--bdr);border-radius:10px;font-size:14px;font-family:var(--font);background:var(--surf-2);color:var(--text);outline:none;box-sizing:border-box;transition:border-color .15s,box-shadow .15s;}
.field-in:focus{border-color:var(--prim);box-shadow:0 0 0 3px rgba(0,122,245,.1);}
.field-in[readonly]{background:var(--bg);color:var(--t3);cursor:default;}
.field-g2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.field-in.saving{border-color:var(--prim);background:#fff;}
.field-in.saved{border-color:var(--green,#16a34a);}
.field-in.errored{border-color:var(--red,#ef4444);}
.autosave-toast{position:fixed;left:50%;bottom:84px;transform:translateX(-50%) translateY(20px);background:#0c1222;color:#fff;font-size:13px;font-weight:600;padding:9px 16px;border-radius:999px;box-shadow:0 6px 20px rgba(0,0,0,.25);opacity:0;pointer-events:none;transition:opacity .18s ease, transform .18s ease;z-index:50;display:flex;align-items:center;gap:8px;}
.autosave-toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.autosave-toast.err{background:#b91c1c;}
</style>
</head>
<body>

<div class="app-topbar">
  <img th:src="@{/images/logo.svg}" alt="logo" style="height:28px;width:auto;filter:brightness(0) invert(1);">
  <div class="app-title">Mon profil</div>
</div>

<div class="app-content">
  <div th:if="${success}" class="flash flash-ok" style="margin-bottom:12px;">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" style="flex-shrink:0"><path d="M3 8l4 4 6-6"/></svg>
    <span th:text="${success}"></span>
  </div>
  <div th:if="${error}" class="flash flash-err" style="margin-bottom:12px;">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" style="flex-shrink:0"><circle cx="8" cy="8" r="6"/><path d="M8 5v3M8 11h.01"/></svg>
    <span th:text="${error}"></span>
  </div>
  <!-- Entête profil -->
  <div class="profile-header">
    <form th:action="@{/mobile/profile/photo}" method="post" enctype="multipart/form-data" style="position:relative;z-index:1;margin-bottom:12px;">
      <label style="cursor:pointer;display:inline-block;position:relative;">
        <div class="ph-avatar" style="margin-bottom:0;overflow:hidden;">
          <img th:if="${member.photo != null}" th:src="@{/mobile/profile/photo}"
               style="width:100%;height:100%;object-fit:cover;border-radius:50%;" alt="photo">
          <span th:unless="${member.photo != null}" th:text="${member.initials}">CB</span>
        </div>
        <div style="position:absolute;bottom:-2px;right:-2px;background:rgba(255,255,255,.2);border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;">
          <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="white" stroke-width="2"><path d="M1 12V14h2l9-9-2-2L1 12z"/><path d="M12 2l2 2"/></svg>
        </div>
        <input type="file" name="file" accept="image/*" style="display:none;" onchange="this.form.submit()">
      </label>
    </form>
    <div class="ph-name" th:text="${member.displayName}">Camille Berrut</div>
    <div th:unless="${member.membership.name() == 'JOURNEE_ESSAI'}"
         class="ph-formula" th:text="${member.membership.label}">Pack 10 jours</div>
    <div th:if="${member.membership.name() == 'JOURNEE_ESSAI'}"
         class="ph-formula">Aucun pack actif</div>
    <div th:if="${member.isPermanent() and member.packExpires != null}" class="ph-formula"
         th:text="'Valide jusqu\'au ' + ${#temporals.format(member.packExpires, 'd MMM yyyy', #locale)}"></div>
    <div class="ph-email" th:text="${member.email}">camille@exemple.ch</div>
  </div>
  <!-- Coordonnées · autosave : chaque champ se sauvegarde à la perte de focus -->
  <form id="profile-form" th:action="@{/mobile/profile}" method="post">
    <div class="form-card">
      <div class="form-card-title">Coordonnées</div>

      <div class="field-row">
        <label class="field-lbl">Email (non modifiable)</label>
        <input type="email" class="field-in" th:value="${member.email}" readonly>
      </div>
      <div class="field-row">
        <label class="field-lbl">Téléphone</label>
        <input type="tel" name="phone" class="field-in" th:value="${member.phone}" placeholder="+41 79 000 00 00">
      </div>
      <div class="field-row">
        <label class="field-lbl">Entreprise</label>
        <input type="text" name="company" class="field-in" th:value="${member.company}" placeholder="Nom de votre entreprise">
      </div>
      <div class="field-row">
        <label class="field-lbl">N° TVA CHE (si entreprise)</label>
        <input type="text" name="tvaNumber" class="field-in" th:value="${member.tvaNumber}" placeholder="CHE-123.456.789 TVA">
      </div>
      <div class="field-row">
        <label class="field-lbl">Site web</label>
        <input type="url" name="website" class="field-in" th:value="${member.website}" placeholder="https://example.com">
      </div>
      <div class="field-row">
        <label class="field-lbl">LinkedIn</label>
        <input type="url" name="linkedinUrl" class="field-in" th:value="${member.linkedinUrl}" placeholder="https://linkedin.com/in/prenom-nom">
      </div>
    </div>

    <div class="form-card">
      <div class="form-card-title">Adresse postale</div>

      <div class="field-row">
        <label class="field-lbl">Rue et numéro</label>
        <input type="text" name="address" class="field-in" th:value="${member.address}" placeholder="Rue de la Gare 12">
      </div>
      <div class="field-row field-g2">
        <div>
          <label class="field-lbl">NPA</label>
          <input type="text" name="postalCode" class="field-in" th:value="${member.postalCode}" placeholder="1926">
        </div>
        <div>
          <label class="field-lbl">Localité</label>
          <input type="text" name="city" class="field-in" th:value="${member.city}" placeholder="Fully">
        </div>
      </div>
      <div class="field-row">
        <label class="field-lbl">Pays</label>
        <input type="text" name="country" class="field-in" th:value="${member.country}" placeholder="Suisse">
      </div>
    </div>

  </form>

  <!-- Indicateur d'autosauvegarde -->
  <div id="autosave-toast" class="autosave-toast" role="status" aria-live="polite">
    <svg id="autosave-icon" width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M3 8l4 4 6-6"/></svg>
    <span id="autosave-text">Enregistré</span>
  </div>

  <!-- Mes appareils WiFi -->
  <a th:href="@{/mobile/devices}"
     style="display:flex;align-items:center;justify-content:space-between;padding:16px 18px;background:var(--surf);border:1px solid var(--bdr);border-radius:16px;margin-top:14px;text-decoration:none;color:var(--text);box-shadow:0 1px 6px rgba(0,0,0,.04);">
    <div style="display:flex;align-items:center;gap:12px;">
      <div style="width:36px;height:36px;border-radius:10px;background:var(--surf-2);display:flex;align-items:center;justify-content:center;">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--t2)" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12.55a11 11 0 0114.08 0"/><path d="M1.42 9a16 16 0 0121.16 0"/><path d="M8.53 16.11a6 6 0 016.95 0"/><circle cx="12" cy="20" r="1" fill="var(--t2)" stroke="none"/></svg>
      </div>
      <div>
        <div style="font-size:14px;font-weight:700;">Mes appareils WiFi</div>
        <div style="font-size:11px;color:var(--t3);margin-top:1px;">Liste, renommage et suppression</div>
      </div>
    </div>
    <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="var(--t3)" stroke-width="1.8"><path d="M6 4l4 4-4 4"/></svg>
  </a>

  <!-- Sécurité -->
  <a th:href="@{/mobile/security}"
     style="display:flex;align-items:center;justify-content:space-between;padding:16px 18px;background:var(--surf);border:1px solid var(--bdr);border-radius:16px;margin-top:14px;text-decoration:none;color:var(--text);box-shadow:0 1px 6px rgba(0,0,0,.04);">
    <div style="display:flex;align-items:center;gap:12px;">
      <div style="width:36px;height:36px;border-radius:10px;background:var(--surf-2);display:flex;align-items:center;justify-content:center;">
        <svg width="18" height="18" viewBox="0 0 16 16" fill="none" stroke="var(--t2)" stroke-width="1.7"><rect x="3" y="7" width="10" height="7" rx="1.5"/><path d="M5 7V5a3 3 0 016 0v2"/><circle cx="8" cy="11" r="1" fill="var(--t2)" stroke="none"/></svg>
      </div>
      <div>
        <div style="font-size:14px;font-weight:700;">Sécurité</div>
        <div style="font-size:11px;color:var(--t3);margin-top:1px;">Changer le mot de passe</div>
      </div>
    </div>
    <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="var(--t3)" stroke-width="1.8"><path d="M6 4l4 4-4 4"/></svg>
  </a>

  <div style="height:8px;"></div>
</div>

<div class="bottom-nav">
  <a th:href="@{/mobile/}" class="nav-btn">
    <svg viewBox="0 0 20 20" fill="currentColor"><path d="M10 2L2 8v10h5v-5h6v5h5V8z"/></svg>
    Accueil
  </a>
  <a th:href="@{/mobile/pack}" class="nav-btn">
    <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="7" width="16" height="11" rx="1.5"/><path d="M6 7V5a4 4 0 018 0v2"/><path d="M2 11h16"/></svg>
    Pack
  </a>
  <a th:href="@{/mobile/rooms}" class="nav-btn">
    <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="4" width="16" height="12" rx="2"/><path d="M8 4v12M2 9h6"/></svg>
    Salles
  </a>
  <a th:href="@{/mobile/print}" class="nav-btn">
    <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="7" width="14" height="9" rx="1.5"/><path d="M6 7V4h8v3"/><circle cx="14.5" cy="11" r=".75" fill="currentColor" stroke="none"/></svg>
    Imprimer
  </a>
  <a th:href="@{/mobile/profile}" class="nav-btn active">
    <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="10" cy="7" r="3"/><path d="M3 18c0-4 3-6 7-6s7 2 7 6"/></svg>
    Profil
  </a>
</div>

<script>
(function () {
  const form = document.getElementById('profile-form');
  if (!form) return;

  const toast    = document.getElementById('autosave-toast');
  const toastTxt = document.getElementById('autosave-text');
  const toastSvg = document.getElementById('autosave-icon');
  const ICON_OK  = '<path d="M3 8l4 4 6-6"/>';
  const ICON_ERR = '<circle cx="8" cy="8" r="6"/><path d="M8 5v3M8 11h.01"/>';

  let toastTimer = null;
  function showToast(msg, ok) {
    toastTxt.textContent = msg;
    toastSvg.innerHTML   = ok ? ICON_OK : ICON_ERR;
    toast.classList.toggle('err', !ok);
    toast.classList.add('show');
    if (toastTimer) clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.classList.remove('show'), ok ? 1500 : 4000);
  }

  // Cache la valeur initiale par champ pour ne pas réémettre des saves vides.
  const initial = new Map();
  form.querySelectorAll('input[name]').forEach(inp => initial.set(inp.name, inp.value));

  let pending = 0;
  async function save(triggerInput) {
    const fd = new FormData(form);
    triggerInput.classList.remove('saved', 'errored');
    triggerInput.classList.add('saving');
    pending++;
    try {
      const resp = await fetch(form.action, {
        method: 'POST',
        body: fd,
        headers: { 'X-Requested-With': 'XMLHttpRequest' },
        credentials: 'same-origin'
      });
      if (!resp.ok) throw new Error('HTTP ' + resp.status);
      triggerInput.classList.remove('saving');
      triggerInput.classList.add('saved');
      setTimeout(() => triggerInput.classList.remove('saved'), 1200);
      initial.set(triggerInput.name, triggerInput.value);
      showToast('Enregistré', true);
    } catch (e) {
      triggerInput.classList.remove('saving');
      triggerInput.classList.add('errored');
      showToast("Erreur d'enregistrement — réessayez", false);
    } finally {
      pending--;
    }
  }

  form.querySelectorAll('input[name]').forEach(inp => {
    if (inp.readOnly) return;
    inp.addEventListener('change', () => {
      if (inp.value === initial.get(inp.name)) return; // pas de changement réel
      save(inp);
    });
  });
})();
</script>
</body>
</html>
