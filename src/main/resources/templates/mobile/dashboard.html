<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0c1222">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Amicale">
<link rel="manifest" th:href="@{/manifest.json}">
<link rel="apple-touch-icon" th:href="@{/icons/icon-192.png}">
<title>l'Amicale du WiFi</title>
<link rel="stylesheet" th:href="@{/css/amicale.css}">
<style>
body{max-width:430px;margin:0 auto;min-height:100dvh;display:flex;flex-direction:column;background:var(--bg);}
.member-card{background:linear-gradient(135deg,#0c1222 0%,#1a2a50 100%);border-radius:20px;padding:22px 20px 20px;margin-bottom:16px;color:#fff;position:relative;overflow:hidden;box-shadow:0 6px 24px rgba(0,0,0,.25);}
.member-card::before{content:'';position:absolute;top:-30px;right:-30px;width:120px;height:120px;border-radius:50%;background:rgba(255,255,255,.06);}
.member-card::after{content:'';position:absolute;bottom:-40px;left:-20px;width:140px;height:140px;border-radius:50%;background:rgba(255,255,255,.04);}
.mc-top{display:flex;align-items:flex-start;justify-content:space-between;position:relative;z-index:1;}
.mc-avatar{width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;border:2px solid rgba(255,255,255,.2);overflow:hidden;}
.mc-name{font-size:20px;font-weight:800;letter-spacing:-.4px;}
.mc-formula{font-size:11px;opacity:.65;margin-top:2px;font-weight:500;}
.scan-btn{display:block;padding:16px;background:var(--prim);color:#fff;border-radius:14px;text-align:center;font-size:15px;font-weight:700;margin-bottom:12px;border:none;cursor:pointer;font-family:var(--font);width:100%;box-shadow:0 4px 16px rgba(0,122,245,.30);transition:all .2s;}
.scan-btn:hover{background:var(--prim-d);transform:translateY(-1px);box-shadow:0 6px 20px rgba(0,122,245,.40);}
.type-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px;}
.type-opt{padding:10px 6px;border-radius:12px;border:1.5px solid var(--bdr);text-align:center;cursor:pointer;transition:all .15s;background:var(--surf);}
.type-opt.sel{border-color:var(--prim);background:var(--prim-l);}
.type-opt-name{font-size:12px;font-weight:700;display:block;}
.type-opt-hours{font-size:10px;color:var(--t3);display:block;margin-top:1px;}
.type-opt-cost{font-size:11px;font-weight:700;display:block;margin-top:3px;}
</style>
</head>
<body>

<div class="app-topbar app-topbar-spread">
  <img th:src="@{/images/logo.svg}" alt="l'Amicale du WiFi"
       style="height:28px;width:auto;filter:brightness(0) invert(1);">
  <form th:action="@{/logout}" method="post" style="display:inline;">
    <button type="submit" style="background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);color:#fff;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;padding:6px 12px;border-radius:8px;">Déconnexion</button>
  </form>
</div>

<div class="app-content">
  <div th:if="${success}" class="flash flash-ok" style="margin-bottom:12px;">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" style="flex-shrink:0"><path d="M3 8l4 4 6-6"/></svg>
    <span th:text="${success}"></span>
  </div>
  <div th:if="${error}" class="flash flash-err" style="margin-bottom:12px;">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" style="flex-shrink:0"><circle cx="8" cy="8" r="6"/><path d="M8 5v3M8 11h.01"/></svg>
    <span th:text="${error}"></span>
  </div>

  <!-- Carte membre -->
  <div class="member-card">
    <div class="mc-top">
      <div>
        <div class="mc-name" th:text="${member.displayName}">Camille Berrut</div>
        <div class="mc-formula"
             th:text="${member.membership.name() == 'JOURNEE_ESSAI' ? 'Aucun pack actif' : member.membership.label}">Pack 10 jours</div>
      </div>
      <div class="mc-avatar">
        <img th:if="${member.photo != null}" th:src="@{/mobile/profile/photo}"
             style="width:100%;height:100%;object-fit:cover;" alt="photo">
        <span th:unless="${member.photo != null}" th:text="${member.initials}">CB</span>
      </div>
    </div>
  </div>

  <!-- Bannière renouvellement si pack épuisé ou faible -->
  <div th:if="${member.packAlert == 'empty' or member.packAlert == 'low' or member.packAlert == 'expiring'}"
       style="background:var(--ol);border:1.5px solid var(--orange);border-radius:14px;padding:14px 16px;margin-bottom:14px;display:flex;align-items:center;gap:12px;">
    <div style="flex-shrink:0;width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;"
         th:style="${member.packAlert == 'empty' ? 'background:rgba(239,68,68,.15)' : 'background:rgba(245,158,11,.15)'}">
      <svg th:if="${member.packAlert == 'empty'}" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--red)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
      <svg th:unless="${member.packAlert == 'empty'}" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--orange)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
    </div>
    <div style="flex:1;">
      <div style="font-size:13px;font-weight:700;color:var(--od);"
           th:text="${member.packAlert == 'empty'
               ? (member.isPermanent() ? 'Abonnement expiré' : 'Pack épuisé')
               : (member.packAlert == 'expiring'
                   ? (member.isPermanent() ? 'Abonnement bientôt expiré' : 'Pack bientôt expiré')
                   : 'Pack presque vide')}">Pack épuisé</div>
      <div style="font-size:11px;color:var(--od);opacity:.8;margin-top:2px;"
           th:text="${member.isPermanent() ? 'Renouvelez votre abonnement mensuel pour continuer' : 'Renouvelez votre pack pour continuer à accéder au coworking'}"></div>
    </div>
    <a th:href="@{/mobile/renew}"
       style="background:var(--orange);color:#fff;font-size:12px;font-weight:800;padding:8px 14px;border-radius:10px;text-decoration:none;white-space:nowrap;">Renouveler</a>
  </div>

  <!-- Scan QR du coworking -->
  <div style="background:var(--gl);border:1.5px solid var(--gt);border-radius:16px;padding:16px;margin-bottom:16px;display:flex;align-items:center;gap:14px;">
    <div style="width:42px;height:42px;border-radius:12px;background:var(--prim);display:flex;align-items:center;justify-content:center;flex-shrink:0;">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="3" height="3"/><rect x="19" y="14" width="2" height="2"/><rect x="14" y="19" width="2" height="2"/><rect x="18" y="19" width="3" height="3"/></svg>
    </div>
    <div style="flex:1;">
      <div style="font-size:13px;font-weight:700;color:var(--gd);">Scanner le QR du coworking</div>
      <div style="font-size:11px;color:var(--gd);opacity:.7;margin-top:2px;">Utilisez votre appareil photo pour scanner le QR affiché à l'entrée</div>
    </div>
  </div>

  <!-- Enregistrement manuel -->
  <div class="section-title">Ou enregistrer manuellement</div>

  <form th:action="@{/mobile/scan}" method="post">
    <div class="type-row" id="typeRow">
      <label class="type-opt" onclick="selType(this)">
        <input type="radio" name="presenceType" value="HALF_AM" style="display:none;">
        <span class="type-opt-name">½ Matin</span>
        <span class="type-opt-hours">07:00–12:30</span>
        <span class="type-opt-cost" style="color:var(--od);">−0.5j</span>
      </label>
      <label class="type-opt sel" onclick="selType(this)">
        <input type="radio" name="presenceType" value="FULL_DAY" checked style="display:none;">
        <span class="type-opt-name">Journée</span>
        <span class="type-opt-hours">07:00–19:00</span>
        <span class="type-opt-cost" style="color:var(--gd);">−1.0j</span>
      </label>
      <label class="type-opt" onclick="selType(this)">
        <input type="radio" name="presenceType" value="HALF_PM" style="display:none;">
        <span class="type-opt-name">½ AP-M</span>
        <span class="type-opt-hours">12:30–19:00</span>
        <span class="type-opt-cost" style="color:var(--od);">−0.5j</span>
      </label>
    </div>

    <div style="margin-bottom:12px;">
      <label style="font-size:11px;font-weight:700;color:var(--t2);display:block;margin-bottom:5px;">Date de présence</label>
      <input type="date" name="date" class="field-in"
             th:value="${#temporals.format(#temporals.createToday(),'yyyy-MM-dd')}"
             style="width:100%;padding:10px 12px;border:1.5px solid var(--bdr);border-radius:10px;font-size:14px;font-family:var(--font);background:var(--surf-2);color:var(--text);outline:none;box-sizing:border-box;">
    </div>

    <button type="submit" class="scan-btn">Enregistrer ma présence</button>
  </form>

  <div style="height:8px;"></div>
</div>

<div class="bottom-nav">
  <a th:href="@{/mobile/}" class="nav-btn active">
    <svg viewBox="0 0 20 20" fill="currentColor"><path d="M10 2L2 8v10h5v-5h6v5h5V8z"/></svg>
    Accueil
  </a>
  <a th:href="@{/mobile/pack}" class="nav-btn">
    <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="7" width="16" height="11" rx="1.5"/><path d="M6 7V5a4 4 0 018 0v2"/><path d="M2 11h16"/></svg>
    Pack
  </a>
  <a th:href="@{/mobile/rooms}" class="nav-btn">
    <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="4" width="16" height="12" rx="2"/><path d="M8 4v12M2 9h6"/></svg>
    Salles
  </a>
  <a th:href="@{/mobile/print}" class="nav-btn">
    <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="7" width="14" height="9" rx="1.5"/><path d="M6 7V4h8v3"/><circle cx="14.5" cy="11" r=".75" fill="currentColor" stroke="none"/></svg>
    Imprimer
  </a>
  <a th:href="@{/mobile/profile}" class="nav-btn">
    <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="10" cy="7" r="3"/><path d="M3 18c0-4 3-6 7-6s7 2 7 6"/></svg>
    Profil
  </a>
</div>

<script>
function selType(el) {
  document.querySelectorAll('.type-opt').forEach(o => o.classList.remove('sel'));
  el.classList.add('sel');
  el.querySelector('input[type=radio]').checked = true;
}
</script>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(() => {});
}
</script>
</body>
</html>
