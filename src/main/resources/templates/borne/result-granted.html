<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
<meta charset="UTF-8">
<meta th:content="'5;url=' + @{/borne/}" http-equiv="refresh">
<title>Accès autorisé</title>
<style>
:root{--green:#2d6a4f;--gm:#4a9270;--gt:#52c08a;--orange:#e07b39;--ot:#f0a060;--text:#e8e6dc;--t2:#9a9a8e;--font:'Helvetica Neue',Helvetica,Arial,sans-serif;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font);background:#081810;color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;padding:20px;}
.card{background:#132018;border:2px solid var(--gt);border-radius:22px;padding:32px 40px;width:100%;max-width:420px;text-align:center;}
.av{width:72px;height:72px;border-radius:50%;background:rgba(82,192,138,.15);border:2px solid var(--gm);display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:700;margin:0 auto 16px;color:var(--gt);}
.name{font-size:22px;font-weight:700;margin-bottom:4px;}
.sub{font-size:13px;color:var(--t2);margin-bottom:16px;}
.tags{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:18px;}
.tag{padding:3px 12px;border-radius:20px;font-size:12px;font-weight:700;}
.tag-g{background:rgba(74,146,112,.2);color:var(--gt);border:1px solid rgba(82,192,138,.35);}
.tag-o{background:rgba(224,123,57,.15);color:var(--ot);border:1px solid rgba(240,160,96,.3);}
.pack-box{background:rgba(255,255,255,.04);border-radius:10px;padding:12px 16px;margin-bottom:18px;text-align:left;}
.pack-lbl{font-size:12px;color:var(--t2);margin-bottom:5px;display:flex;justify-content:space-between;}
.pack-bar{height:8px;background:rgba(255,255,255,.08);border-radius:4px;overflow:hidden;}
.pack-fill{height:100%;border-radius:4px;}
.confirm{background:var(--green);color:#fff;border:none;border-radius:12px;padding:14px;width:100%;font-size:15px;font-weight:700;cursor:pointer;font-family:var(--font);}
.progress{width:300px;height:4px;background:rgba(255,255,255,.08);border-radius:2px;overflow:hidden;}
.pf{height:100%;background:var(--gm);border-radius:2px;animation:p 5s linear forwards;}
@keyframes p{from{width:100%}to{width:0}}
</style>
</head>
<body>
<div class="card" th:with="g=${result}">
  <div class="av" th:text="${g.member().initials()}">CB</div>
  <div class="name" th:text="${g.member().displayName()}">Camille Berrut</div>
  <div class="sub" th:text="${g.member().membership().label} + ' · Bienvenue !'"></div>

  <div class="tags">
    <span class="tag tag-g" th:text="${g.member().badgeUid()}"></span>
    <span th:switch="${g.presence().presenceType().name()}">
      <span th:case="'FULL_DAY'" class="tag tag-g">Journée − 1.0j</span>
      <span th:case="'HALF_AM'"  class="tag tag-o">½ Matin − 0.5j</span>
      <span th:case="'HALF_PM'"  class="tag tag-o">½ AP-M − 0.5j</span>
      <span th:case="'TRIAL'"    class="tag tag-o">Essai gratuit</span>
      <span th:case="*" class="tag tag-o" th:text="${g.presence().presenceType().shortLabel}"></span>
    </span>
  </div>

  <div class="pack-box" th:if="${g.packRemaining() != null}">
    <div class="pack-lbl">
      <span>Unités restantes</span>
      <strong th:text="${g.packRemaining()} + 'j = ' + ${g.halfDays()} + ' demi-j.'"></strong>
    </div>
    <div class="pack-bar">
      <div class="pack-fill"
           th:style="'width:' + (${g.member().packUnitsTotal() != null ? g.packRemaining().doubleValue() / g.member().packUnitsTotal().doubleValue() * 100 : 50}) + '%;background:' + (${g.packRemaining().doubleValue() <= 1.0} ? 'var(--orange)' : 'var(--gm)')">
      </div>
    </div>
  </div>

  <button class="confirm" th:attr="data-url=@{/borne/}" onclick="window.location=this.dataset.url">✓ Bonne journée à Fully !</button>
</div>
<div class="progress"><div class="pf"></div></div>
<div style="font-size:12px;color:var(--t2);">Retour automatique dans 5 secondes…</div>
</body>
</html>
