<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::title}, ~{::content})}">
<head><title>Packs — l'Amicale du WiFi</title></head>
<body>
<th:block th:fragment="content">
<div class="topbar">
  <div>
    <div class="topbar-title">Packs</div>
    <div class="topbar-sub" style="text-transform:capitalize;" th:text="${#temporals.format(billingMonth.atDay(1),'MMMM yyyy')}"></div>
  </div>
  <div class="topbar-r">
    <a th:href="@{/admin/printer/billing(month=${prevMonth})}" class="btn btn-sm">← Préc.</a>
    <a th:href="@{/admin/printer/billing}" class="btn btn-sm">Mois en cours</a>
    <a th:href="@{/admin/printer/billing(month=${nextMonth})}" class="btn btn-sm">Suiv. →</a>
  </div>
</div>

<div class="content">

  <div th:if="${success}" class="flash flash-ok">✓ <span th:text="${success}"></span></div>

  <div class="card">
    <div class="card-hdr">
      <span class="card-ttl">Packs vendus</span>
      <span class="b b-g" th:text="${#lists.size(packTxs)}+' transaction(s)'"></span>
    </div>
    <table class="table">
      <thead>
        <tr>
          <th>Date</th>
          <th>Membre</th>
          <th>Formule</th>
          <th>Type</th>
          <th style="text-align:right;">Montant</th>
        </tr>
      </thead>
      <tbody>
        <tr th:each="tx : ${packTxs}">
          <td style="white-space:nowrap;font-size:12px;color:var(--t3);"
              th:text="${#temporals.format(tx.createdAt,'d MMM yyyy')}"></td>
          <td>
            <div style="font-weight:600;" th:text="${tx.member.displayName}"></div>
            <div style="font-size:11px;color:var(--t3);" th:text="${tx.member.email}"></div>
          </td>
          <td th:text="${tx.membership.label.split(' — ')[0]}"></td>
          <td>
            <span th:if="${tx.kind == 'create'}" class="b b-g" style="font-size:10px;">Nouveau</span>
            <span th:unless="${tx.kind == 'create'}" class="b b-o" style="font-size:10px;">Renouvellement</span>
          </td>
          <td style="text-align:right;font-weight:800;font-size:15px;color:var(--green-d);"
              th:text="'Fr. '+${#numbers.formatDecimal(tx.amountChf,1,2)}"></td>
        </tr>
        <tr th:if="${#lists.isEmpty(packTxs)}">
          <td colspan="5" style="text-align:center;color:var(--t3);padding:24px;">Aucun pack vendu ce mois</td>
        </tr>
      </tbody>
      <tfoot th:unless="${#lists.isEmpty(packTxs)}">
        <tr style="background:var(--surf-2);">
          <td colspan="4" style="font-weight:700;padding:13px 18px;">Total</td>
          <td style="text-align:right;font-size:16px;font-weight:900;color:var(--green-d);padding:13px 18px;"
              th:text="'Fr. '+${#numbers.formatDecimal(#aggregates.sum(packTxs.![amountChf]),1,2)}"></td>
        </tr>
      </tfoot>
    </table>
  </div>

</div>
</th:block>
</body>
</html>
