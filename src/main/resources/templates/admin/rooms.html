<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::title}, ~{::content})}">
<head><title>Salles — l'Amicale du Wifi</title></head>
<body>
<th:block th:fragment="content">
<div class="topbar">
  <div>
    <div class="topbar-title">Salles de réunion</div>
    <div class="topbar-sub">Fr. 19.-/h · Crédits pack inclus · 8h00–21h00</div>
  </div>
  <div class="topbar-r">
    <button class="btn btn-g btn-sm" onclick="openModal('m-book')">+ Réservation</button>
  </div>
</div>
<div class="content">
  <div th:if="${success}" class="flash flash-ok">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" style="flex-shrink:0"><path d="M3 8l4 4 6-6"/></svg>
    <span th:text="${success}"></span>
  </div>
  <div th:if="${error}" class="flash flash-err">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" style="flex-shrink:0"><circle cx="8" cy="8" r="6"/><path d="M8 5v3M8 11h.01"/></svg>
    <span th:text="${error}"></span>
  </div>

  <!-- Navigateur de date -->
  <div style="display:flex;align-items:center;gap:10px;margin-bottom:18px;">
    <a th:href="@{/admin/rooms(date=${#temporals.format(date.minusDays(1),'yyyy-MM-dd')})}"
       class="btn btn-sm">← Préc.</a>
    <form method="get" action="/admin/rooms" style="display:flex;align-items:center;gap:8px;flex:1;">
      <input type="date" name="date" class="form-in"
             th:value="${#temporals.format(date,'yyyy-MM-dd')}"
             style="max-width:180px;"
             onchange="this.form.submit()">
      <button type="submit" class="btn btn-sm">Voir</button>
      <a th:href="@{/admin/rooms}" class="btn btn-sm">Aujourd'hui</a>
    </form>
    <a th:href="@{/admin/rooms(date=${#temporals.format(date.plusDays(1),'yyyy-MM-dd')})}"
       class="btn btn-sm">Suiv. →</a>
    <span style="font-size:13px;font-weight:600;color:var(--t2);"
          th:text="${#temporals.format(date,'EEEE d MMMM yyyy')}"></span>
  </div>

  <!-- Salles -->
  <div class="g2">
    <div th:each="room : ${rooms}" class="card"
         th:style="${'border-top:3px solid ' + (bookedRoomIds.contains(room.id) ? 'var(--red)' : 'var(--prim)')}">
      <div class="card-hdr">
        <div>
          <div style="font-weight:700;font-size:14px;" th:text="${room.name}"></div>
          <div style="font-size:11px;color:var(--t3);margin-top:2px;"
               th:text="${room.capacity}+' pers. · '+(${room.equipment!=null?#strings.arrayJoin(room.equipment,' · '):''})"></div>
        </div>
        <span th:if="${bookedRoomIds.contains(room.id)}" class="b b-r">Réservée</span>
        <span th:unless="${bookedRoomIds.contains(room.id)}" class="b b-g">Libre</span>
      </div>
      <div class="card-body">
        <div class="slot-row" style="margin-bottom:10px;">
          <div th:each="h : ${#numbers.sequence(8,20)}" class="slot"
               th:classappend="${bookedHoursByRoom.containsKey(room.id) and bookedHoursByRoom.get(room.id).contains(h)} ? 'slot-b' : 'slot-f'"
               th:title="${h}+':00'"></div>
        </div>
        <div th:each="b : ${bookings}" th:if="${b.room.id.equals(room.id)}"
             style="font-size:12px;padding:5px 8px;background:var(--red-l);border-radius:var(--r);margin-bottom:4px;display:flex;justify-content:space-between;align-items:center;">
          <span>
            <strong th:text="${#temporals.format(b.startTime,'HH:mm')}+' – '+${#temporals.format(b.endTime,'HH:mm')}"></strong>
            · <span th:text="${b.organizerName?:b.title?:'—'}"></span>
            · <span th:text="${b.participants}+' pers.'"></span>
          </span>
          <form th:action="@{/admin/rooms/bookings/{id}/cancel(id=${b.id})}" method="post" style="display:inline;">
            <button class="btn btn-sm btn-r" style="padding:2px 7px;font-size:11px;">Annuler</button>
          </form>
        </div>

      </div>
    </div>
  </div>

  <!-- Vue mensuelle -->
  <div class="card" style="margin-top:18px;">
    <div class="card-hdr">
      <span class="card-ttl">
        Vue mensuelle —
        <span th:text="${#temporals.format(monthYear.atDay(1),'MMMM yyyy',#locale)}"></span>
      </span>
      <div style="display:flex;gap:6px;align-items:center;">
        <a th:href="@{/admin/rooms(month=${prevMonth},date=${#temporals.format(date,'yyyy-MM-dd')})}" class="btn btn-sm">←</a>
        <a th:href="@{/admin/rooms(date=${#temporals.format(date,'yyyy-MM-dd')})}" class="btn btn-sm">Ce mois</a>
        <a th:href="@{/admin/rooms(month=${nextMonth},date=${#temporals.format(date,'yyyy-MM-dd')})}" class="btn btn-sm">→</a>
      </div>
    </div>
    <div class="card-body" style="padding-bottom:8px;">

      <!-- En-têtes jours -->
      <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:4px;">
        <div th:each="h : ${ {'Lun','Mar','Mer','Jeu','Ven','Sam','Dim'} }"
             style="text-align:center;font-size:11px;font-weight:700;color:var(--t3);padding:4px 0;"
             th:text="${h}"></div>
      </div>

      <!-- Grille des jours -->
      <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px;">

        <!-- Cases vides avant le 1er -->
        <div th:each="e : ${#numbers.sequence(1, firstDow - 1)}"
             style="min-height:70px;"></div>

        <!-- Jours du mois -->
        <div th:each="day : ${#numbers.sequence(1, daysInMonth)}"
             th:with="hasBookings=${monthBookingsByDay.containsKey(day)},
                      isToday=${monthYear.atDay(day).equals(#temporals.createToday())}"
             style="min-height:70px;border:1px solid var(--bdr);border-radius:6px;padding:5px;font-size:11px;"
             th:style="'min-height:70px;border:1px solid var(--bdr);border-radius:6px;padding:5px;font-size:11px;'
                       + (${isToday} ? 'border-color:var(--prim);background:var(--prim-l);' : '')
                       + (${hasBookings and !isToday} ? 'border-color:var(--orange);' : '')">
          <div style="font-weight:700;margin-bottom:3px;"
               th:style="'font-weight:700;margin-bottom:3px;color:'+(${isToday} ? 'var(--gd)' : 'var(--text)')"
               th:text="${day}"></div>
          <div th:if="${hasBookings}"
               th:each="b : ${monthBookingsByDay.get(day)}"
               style="background:var(--ol);border-radius:3px;padding:1px 4px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--od);">
            <span th:text="${#temporals.format(b.startTime,'HH:mm')}"></span>
            <span th:text="${b.room.name}" style="font-weight:600;"></span>
          </div>
        </div>

      </div>
    </div>
  </div>

  <!-- Toutes les réservations à venir -->
  <div class="card" style="margin-top:18px;">
    <div class="card-hdr">
      <span class="card-ttl">Toutes les réservations à venir</span>
      <span class="b b-bl" th:text="${#lists.size(allBookings)}+' réservation(s)'"></span>
    </div>
    <table class="table">
      <thead>
        <tr>
          <th>Date</th>
          <th>Salle</th>
          <th>Horaire</th>
          <th>Organisateur</th>
          <th>Participants</th>
          <th>Objet</th>
          <th></th>
        </tr>
      </thead>
      <tbody>
        <tr th:each="b : ${allBookings}">
          <td style="white-space:nowrap;">
            <div style="font-weight:700;" th:text="${#temporals.format(b.date,'E d MMM')}"></div>
            <div style="font-size:11px;color:var(--t3);" th:text="${#temporals.format(b.date,'yyyy')}"></div>
          </td>
          <td>
            <span class="b b-gr" th:text="${b.room.name}"></span>
          </td>
          <td style="white-space:nowrap;font-variant-numeric:tabular-nums;">
            <span th:text="${#temporals.format(b.startTime,'HH:mm')}+' – '+${#temporals.format(b.endTime,'HH:mm')}"></span>
          </td>
          <td>
            <div th:if="${b.member != null}" style="display:flex;align-items:center;gap:7px;">
              <div class="av" style="background:var(--gl);color:var(--gd);width:28px;height:28px;font-size:10px;" th:text="${b.member.initials}"></div>
              <span th:text="${b.organizerName?:b.member.displayName}"></span>
            </div>
            <span th:unless="${b.member != null}" style="color:var(--t2);" th:text="${b.organizerName?:'Externe'}"></span>
          </td>
          <td style="color:var(--t2);" th:text="${b.participants}+' pers.'"></td>
          <td style="color:var(--t3);font-size:13px;" th:text="${b.title?:'—'}"></td>
          <td>
            <form th:action="@{/admin/rooms/bookings/{id}/cancel(id=${b.id})}" method="post" style="display:inline;">
              <button class="btn btn-sm btn-r">Annuler</button>
            </form>
          </td>
        </tr>
        <tr th:if="${#lists.isEmpty(allBookings)}">
          <td colspan="7" style="text-align:center;color:var(--t3);padding:24px;">Aucune réservation à venir</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

<!-- MODAL: Réservation -->
<div id="m-book" class="modal-overlay">
  <div class="modal">
    <div class="modal-ttl">Nouvelle réservation</div>
    <form th:action="@{/admin/rooms/book}" method="post">
      <div class="form-row">
        <label class="form-lbl">Salle</label>
        <select name="roomId" class="form-sel" required>
          <option th:each="room : ${rooms}" th:value="${room.id}" th:text="${room.name}+' ('+${room.capacity}+' pers.)'"></option>
        </select>
      </div>
      <div class="form-row">
        <label class="form-lbl">Membre (optionnel)</label>
        <select name="memberId" class="form-sel">
          <option value="">— Externe / sans compte —</option>
          <option th:each="m : ${members}" th:value="${m.id}" th:text="${m.displayName}"></option>
        </select>
      </div>
      <div class="form-row">
        <label class="form-lbl">Organisateur</label>
        <input name="organizerName" class="form-in" placeholder="Nom de l'organisateur">
      </div>
      <div class="form-g">
        <div class="form-row"><label class="form-lbl">Date</label><input name="date" type="date" class="form-in" th:value="${#temporals.format(date,'yyyy-MM-dd')}" required></div>
        <div class="form-row"><label class="form-lbl">Participants</label><input name="participants" type="number" class="form-in" value="1" min="1" max="12"></div>
      </div>
      <div class="form-g">
        <div class="form-row"><label class="form-lbl">Début</label><input name="startTime" type="time" class="form-in" value="09:00" min="08:00" max="20:00" required></div>
        <div class="form-row"><label class="form-lbl">Fin</label><input name="endTime" type="time" class="form-in" value="11:00" min="09:00" max="21:00" required></div>
      </div>
      <div class="form-row">
        <label class="form-lbl">Titre / objet</label>
        <input name="title" class="form-in" placeholder="Réunion d'équipe">
      </div>
      <label style="display:flex;align-items:center;gap:8px;margin-bottom:4px;">
        <input type="checkbox" name="billedFromCredits" value="true" checked>
        <span style="font-size:13px;">Déduire des crédits conférence du membre</span>
      </label>
      <div class="modal-footer">
        <button type="button" class="btn" onclick="closeModal('m-book')">Annuler</button>
        <button type="submit" class="btn btn-g">Confirmer</button>
      </div>
    </form>
  </div>
</div>
</th:block>
</body>
</html>
