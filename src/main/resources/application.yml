spring:
  application:
    name: amicale-wifi

  config:
    import: optional:application-local.yml

  mail:
    host: mail.infomaniak.com
    port: 587
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true
      mail.smtp.starttls.required: true

  datasource:
    url:               jdbc:postgresql://localhost:5432/amicale_wifi
    username:          amicale
    password:          CHANGE_ME
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle:      2

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect:    org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: Europe/Zurich

  flyway:
    enabled:             true
    locations:           classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true
    clean-disabled:      true
    placeholders:
      # V13 created a 'databasus' PG role; V14 drops it. The placeholder here
      # only matters for fresh installs (V13 needs a value to substitute before
      # V14 immediately drops the role).
      databasuspwd:      unused-removed-in-v14

  # HTTP sessions persisted in Postgres so they survive container restarts.
  # Schema is created by Flyway (V15), not by Spring Session itself.
  session:
    store-type: jdbc
    jdbc:
      initialize-schema: never
    timeout: 3650d   # ~10 years; effectively "never expire" — users only logged out via explicit logout

  thymeleaf:
    cache:    false
    mode:     HTML
    encoding: UTF-8

  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: Europe/Zurich
    default-property-inclusion: NON_NULL

  servlet:
    multipart:
      enabled:      true
      max-file-size: 50MB
      max-request-size: 50MB

  devtools:
    restart:
      enabled: true

  # Run Tomcat request handlers, @Async tasks, JdbcTemplate calls and
  # WebClient/RestClient on virtual threads (Loom, Java 21+). Better
  # throughput for I/O-bound workloads (JPA queries, outbound calls to
  # Zahls / UniFi / Akuvox) at no code cost.
  threads:
    virtual:
      enabled: true

  # Max time given to in-flight requests to finish during a graceful shutdown
  # (see server.shutdown: graceful below). 20s ≤ Docker's default 10s SIGTERM
  # timeout × 2; in compose we may also want to bump stop_grace_period.
  lifecycle:
    timeout-per-shutdown-phase: 20s

server:
  port: 8081
  # Graceful shutdown: on SIGTERM, stop accepting new connections but let
  # in-flight requests finish (up to spring.lifecycle.timeout-per-shutdown-phase
  # below) before killing the JVM. Pairs with Caddy's lb_try_duration to make
  # deploys invisible: in-flight requests complete on the old container, new
  # requests are buffered by Caddy until the new container is up.
  shutdown: graceful
  servlet:
    session:
      # Effectively "never expire" — users only logged out via explicit logout.
      timeout: 3650d
      cookie:
        # Persistent cookie (max-age set) — survives browser close.
        max-age:   3650d
        http-only: true
        same-site: lax
        secure:    true   # Caddy terminates TLS in front; cookie only sent over HTTPS

# Règles métier Amicale du WiFi
amicale:
  mail:
    from:     "l'Amicale du WiFi <noreply@amicalewifi.ch>"
    base-url: https://app.amicalewifi.ch

  business:
    opening-hour:       7      # coworking ouvre à 07:00
    closing-hour:       19     # coworking ferme à 19:00
    full-day-units:     1.0    # 1 journée = 1.0 unité de pack
    half-day-units:     0.5    # 1 demi-journée = 0.5 unité de pack
    conf-rate-chf:      19.00  # Fr. 19.-/h salle conférence
    print-cost-chf:     0.05   # Fr. 0.05/page imprimante (legacy, flux app)
    print-color-factor: 2      # 1 page couleur = 2 crédits (flux IPP claudine)
    print-bw-factor:    1      # 1 page N&B    = 1 crédit  (flux IPP claudine)

  printer:
    host:       192.168.1.10  # Kyocera TASKalfa 352ci · 00:17:c8:ea:dc:84 — alias: claudine
    port:       9100          # port RAW Kyocera
    timeout-ms: 2000

  print:
    # Secret partagé entre coworker-app et le container CUPS broker (claudine).
    # Le broker l'envoie en header X-Print-Broker-Key sur tout appel /api/v1/print/**.
    # Auto-généré par bootstrap.sh si vide dans .env.
    broker-key:   ${AMICALE_PRINT_BROKER_KEY:CHANGE_ME}
    public-host:  print.amicalewifi.ch
    queue-name:   claudine

  venue:
    qr-token: amicale-fully-2024  # Token du QR code affiché dans le coworking

  akuvox:
    api-key:      CHANGE_ME
    http-port:    80
    device-url:   http://192.168.1.102
    device-user:  user
    device-pass:  CHANGE_ME

  unifi:
    api-key:  CHANGE_ME
    site:     default
    base-url: https://api.ui.com/proxy/network
    voucher-expire-minutes: 600   # 10 heures

  zahls:
    instance:    CHANGE_ME
    api-key:     CHANGE_ME
    base-url:    https://api.zahls.ch/v1.14
    success-url:       http://localhost:8081/mobile/?renewed=ok
    cancel-url:        http://localhost:8081/mobile/
    print-success-url: http://localhost:8081/mobile/print?bought=ok
    print-cancel-url:  http://localhost:8081/mobile/print
    conf-success-url:  http://localhost:8081/mobile/rooms?bought=ok
    conf-cancel-url:   http://localhost:8081/mobile/rooms
    # Liens de paiement statiques (optionnel — prioritaire sur l'API si défini)
    # Configurer dans application-local.yml sous amicale.zahls.gateways:

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

logging:
  level:
    root:                         INFO
    ch.amicalewifi:               DEBUG
    org.springframework.security: WARN

---
spring:
  config:
    activate:
      on-profile: test
  datasource:
    url:               jdbc:h2:mem:testdb;MODE=PostgreSQL
    username:          sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
  flyway:
    enabled: false
